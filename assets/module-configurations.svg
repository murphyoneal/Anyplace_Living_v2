<svg width="100%" viewBox="0 0 680 580" role="img" style="display:block;margin:40px 0;">
<title>Anyplace module configurations — any shape, any direction, imperial and metric</title>
<desc>Five floor plan configurations showing how Anyplace modules combine in any direction like Tetris pieces, with square footage and square metre measurements.</desc>
<defs>
<marker id="arr-cfg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- TITLE -->
<text font-family="DM Serif Display,serif" font-size="15" fill="#3d3d3a" x="56" y="36">Any shape. Any direction. Like Tetris — but permanent.</text>

<!-- MODULE DIMENSIONS REFERENCE BOX -->
<rect x="56" y="48" width="568" height="40" rx="4" fill="#f7f4ef" stroke="#e2e0d8" stroke-width="0.5"/>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" x="72" y="64">Single module:</text>
<text font-family="DM Sans,sans-serif" font-size="11" fill="#6b6b66" x="160" y="64">14.7 × 11.2 × 8.8 ft (4480 × 3430 × 2670mm) · 165 sq ft (15.3 m²) · 1,983 kg · 46 parts</text>
<text font-family="DM Sans,sans-serif" font-size="11" fill="#6b6b66" x="72" y="80">Assembled in 1 day · 2 people · fewer than 10 tools · no crane</text>

<!-- SMALL MODULE = 90×68px for config grid -->

<!-- CONFIG 1: Linear 1 module -->
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="56" y="116">1 module</text>
<rect x="56" y="122" width="90" height="68" fill="#f7f4ef" stroke="#1a1a18" stroke-width="3"/>
<g fill="#639922" opacity="0.8"><circle cx="56" cy="122" r="4"/><circle cx="146" cy="122" r="4"/><circle cx="56" cy="190" r="4"/><circle cx="146" cy="190" r="4"/></g>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" text-anchor="middle" x="101" y="153">165 sq ft</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="101" y="167">(15.3 m²)</text>

<!-- CONFIG 2: Linear 2 modules -->
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="180" y="116">2 modules — long end</text>
<rect x="180" y="122" width="90" height="68" fill="#f7f4ef" stroke="#1a1a18" stroke-width="3"/>
<rect x="270" y="122" width="90" height="68" fill="#eaf3de" stroke="#1a1a18" stroke-width="3"/>
<line x1="270" y1="122" x2="270" y2="190" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<g fill="#639922" opacity="0.8">
  <circle cx="180" cy="122" r="4"/><circle cx="360" cy="122" r="4"/>
  <circle cx="180" cy="190" r="4"/><circle cx="360" cy="190" r="4"/>
</g>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" text-anchor="middle" x="270" y="153">330 sq ft</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="270" y="167">(30.7 m²)</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#9a9a94" text-anchor="middle" x="270" y="205">29.4 ft wide</text>

<!-- CONFIG 3: L-shape 3 modules -->
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="404" y="116">3 modules — L-shape</text>
<rect x="404" y="122" width="90" height="68" fill="#f7f4ef" stroke="#1a1a18" stroke-width="3"/>
<rect x="494" y="122" width="90" height="68" fill="#eaf3de" stroke="#1a1a18" stroke-width="3"/>
<rect x="404" y="190" width="90" height="68" fill="#e8f4ee" stroke="#1a1a18" stroke-width="3"/>
<line x1="494" y1="122" x2="494" y2="190" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<line x1="404" y1="190" x2="494" y2="190" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<g fill="#639922" opacity="0.8">
  <circle cx="404" cy="122" r="4"/><circle cx="584" cy="122" r="4"/>
  <circle cx="404" cy="190" r="4"/><circle cx="494" cy="190" r="4"/>
  <circle cx="584" cy="190" r="4"/>
  <circle cx="404" cy="258" r="4"/><circle cx="494" cy="258" r="4"/>
</g>
<path d="M404 122 L584 122 L584 190 L494 190 L494 258 L404 258 Z" fill="none" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" text-anchor="middle" x="494" y="180">484 sq ft</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="494" y="245">(45 m²)</text>

<!-- CONFIG 4: T-shape 4 modules — row 2 -->
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="56" y="295">4 modules — T-shape</text>
<rect x="56"  y="302" width="90" height="68" fill="#f7f4ef" stroke="#1a1a18" stroke-width="3"/>
<rect x="146" y="302" width="90" height="68" fill="#eaf3de" stroke="#1a1a18" stroke-width="3"/>
<rect x="236" y="302" width="90" height="68" fill="#e8f4ee" stroke="#1a1a18" stroke-width="3"/>
<rect x="146" y="370" width="90" height="68" fill="#e1f5ee" stroke="#1a1a18" stroke-width="3"/>
<line x1="146" y1="302" x2="146" y2="370" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<line x1="236" y1="302" x2="236" y2="370" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<line x1="146" y1="370" x2="236" y2="370" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<g fill="#639922" opacity="0.8">
  <circle cx="56"  cy="302" r="4"/><circle cx="326" cy="302" r="4"/>
  <circle cx="56"  cy="370" r="4"/><circle cx="326" cy="370" r="4"/>
  <circle cx="146" cy="370" r="4"/><circle cx="236" cy="370" r="4"/>
  <circle cx="146" cy="438" r="4"/><circle cx="236" cy="438" r="4"/>
</g>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" text-anchor="middle" x="191" y="342">646 sq ft</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="191" y="356">(60 m²)</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="191" y="420">4 modules</text>

<!-- CONFIG 5: U-shape 5 modules -->
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="380" y="295">5 modules — U-shape / courtyard</text>
<rect x="380" y="302" width="90" height="68" fill="#f7f4ef" stroke="#1a1a18" stroke-width="3"/>
<rect x="560" y="302" width="90" height="68" fill="#eaf3de" stroke="#1a1a18" stroke-width="3"/>
<rect x="380" y="370" width="90" height="68" fill="#e8f4ee" stroke="#1a1a18" stroke-width="3"/>
<rect x="470" y="370" width="90" height="68" fill="#e1f5ee" stroke="#1a1a18" stroke-width="3"/>
<rect x="560" y="370" width="90" height="68" fill="#eaf3de" stroke="#1a1a18" stroke-width="3"/>
<line x1="380" y1="370" x2="470" y2="370" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<line x1="470" y1="370" x2="560" y2="370" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
<line x1="470" y1="302" x2="470" y2="438" stroke="#639922" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
<g fill="#639922" opacity="0.8">
  <circle cx="380" cy="302" r="4"/><circle cx="470" cy="302" r="4"/>
  <circle cx="560" cy="302" r="4"/><circle cx="650" cy="302" r="4"/>
  <circle cx="380" cy="370" r="4"/><circle cx="650" cy="370" r="4"/>
  <circle cx="380" cy="438" r="4"/><circle cx="470" cy="438" r="4"/>
  <circle cx="560" cy="438" r="4"/><circle cx="650" cy="438" r="4"/>
</g>
<!-- courtyard opening indicator -->
<rect x="472" y="304" width="86" height="64" fill="none" stroke="#9a9a94" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.4"/>
<text font-family="DM Sans,sans-serif" font-size="9" fill="#9a9a94" text-anchor="middle" x="515" y="336">courtyard</text>
<text font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#1a1a18" text-anchor="middle" x="515" y="405">807 sq ft</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="515" y="419">(75 m²)</text>
<text font-family="DM Sans,sans-serif" font-size="10" fill="#6b6b66" text-anchor="middle" x="515" y="456">5 modules</text>

<!-- FOOTER -->
<line x1="56" y1="488" x2="624" y2="488" stroke="#e2e0d8" stroke-width="0.5"/>
<rect x="56" y="500" width="8" height="8" rx="1" fill="#639922" opacity="0.9"/>
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" x="70" y="509">Patented corner — connects in any direction, long end or short end</text>
<text font-family="DM Sans,sans-serif" font-size="11" fill="#9a9a94" text-anchor="middle" x="340" y="530">Every configuration uses the same module. Every wall is removable. Every shape is possible.</text>
<text font-family="DM Serif Display,serif" font-size="18" fill="#1a1a18" text-anchor="middle" x="340" y="558">∞</text>

</svg>
