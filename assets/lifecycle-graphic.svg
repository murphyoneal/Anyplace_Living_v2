<svg width="100%" viewBox="0 0 680 820" role="img" style="display:block;margin:40px 0;">
<title>The Anyplace Lifecycle — building, person, and nature across a lifetime on the same land</title>
<desc>Three parallel tracks showing how the Anyplace building adapts across life stages while the occupant ages and the surrounding nature grows, all on the same land.</desc>
